# PostgreSQL and Langfuse run separately — point DATABASE_URL and LANGFUSE_HOST
# in .env at your external instances before starting these services.

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: finance_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app/backend
      # Keep SQL migrations on the host in sync during development (image also COPYs them).
      - ../migrations:/app/migrations:ro
    networks:
      - default
      - langfuse_network
    # --reload restarts the API when Python files under the mount change (editor save, agent, etc.).
    # --reload-dir limits the watch tree to /app/backend. For stable long LLM calls, drop --reload.
    command: >
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/backend
      --timeout-graceful-shutdown 120
      --log-level info

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: finance_frontend
    ports:
      - "3002:3002"
    env_file:
      - ../.env
    environment:
      # Reliable file watching on Docker Desktop bind mounts + correct HMR WebSocket for the host browser.
      DOCKER: "1"
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_API_TARGET: "http://backend:8000"
      VITE_HMR_HOST: "localhost"
      VITE_HMR_PORT: "3002"
      VITE_HMR_CLIENT_PORT: "3002"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

networks:
  langfuse_network:
    external: true
