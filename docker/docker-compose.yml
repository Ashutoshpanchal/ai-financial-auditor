version: "3.9"

# PostgreSQL and Langfuse run separately — point DATABASE_URL and LANGFUSE_HOST
# in .env at your external instances before starting these services.

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: finance_backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app/backend
    networks:
      - default
      - langfuse_network
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: finance_frontend
    ports:
      - "3002:3002"
    env_file:
      - ../.env
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

networks:
  langfuse_network:
    external: true
